# Artifact Registry
#
# Product-level artifacts are listed here with fixed paths.
# Sprint-scoped artifacts follow the pattern below — the scrum-master adds
# entries for each sprint when it initialises a new sprint folder.
#
# Sprint artifact pattern:
#   sprints/{sprint}/intent.md              owner: scrum_master
#   sprints/{sprint}/delivery/frontend.md   owner: frontend_developer
#   sprints/{sprint}/delivery/backend.md    owner: backend_developer
#   sprints/{sprint}/delivery/devops.md     owner: devops_engineer
#   sprints/{sprint}/quality/test_strategy.md  owner: qa_tester
#   sprints/{sprint}/quality/test_report.md    owner: qa_tester
#   sprints/{sprint}/quality/security_review.md  owner: security_officer
#   sprints/{sprint}/quality/threat_model.md     owner: security_officer
#   sprints/{sprint}/review.md              owner: scrum_master
#   sprints/{sprint}/po_decision.md         owner: product_owner

artifacts:

  # ── Context (Product Owner) ──────────────────────────────────────────────

  context/project_context.md:
    owner: product_owner
    version: "0.1"
    status: draft
    immutable_for_non_po: true
    depends_on: []

  context/project_context_change_log.md:
    owner: product_owner
    status: active
    immutable_for_non_po: true
    depends_on: []

  # ── Planning (Product Manager + Scrum Master) ────────────────────────────

  planning/roadmap.md:
    owner: product_manager
    status: draft
    depends_on:
      - context/project_context.md

  planning/epics.md:
    owner: product_manager
    status: draft
    depends_on:
      - context/project_context.md
      - planning/roadmap.md

  planning/backlog.md:
    owner: product_manager
    status: draft
    depends_on:
      - planning/epics.md

  planning/release_plan.md:
    owner: product_manager
    status: draft
    depends_on:
      - planning/roadmap.md
      - planning/backlog.md

  # ── Analysis (Business Analyst) ──────────────────────────────────────────

  analysis/requirements.md:
    owner: business_analyst
    status: draft
    depends_on:
      - context/project_context.md
      - planning/epics.md

  analysis/non_functional_requirements.md:
    owner: business_analyst
    status: draft
    depends_on:
      - context/project_context.md
      - analysis/requirements.md

  analysis/business_rules.md:
    owner: business_analyst
    status: draft
    depends_on:
      - context/project_context.md
      - analysis/requirements.md

  analysis/edge_cases.md:
    owner: business_analyst
    status: draft
    depends_on:
      - analysis/requirements.md
      - analysis/business_rules.md

  analysis/data_requirements.md:
    owner: business_analyst
    status: draft
    depends_on:
      - analysis/requirements.md

  # ── Architecture (System Architect) ─────────────────────────────────────

  architecture/architecture.md:
    owner: system_architect
    status: draft
    depends_on:
      - context/project_context.md
      - analysis/requirements.md
      - analysis/non_functional_requirements.md

  architecture/api_contracts.md:
    owner: system_architect
    status: draft
    depends_on:
      - architecture/architecture.md
      - analysis/requirements.md

  architecture/data_model.md:
    owner: system_architect
    status: draft
    depends_on:
      - analysis/data_requirements.md
      - architecture/architecture.md

  # ── Sprint-scoped artifacts ──────────────────────────────────────────────
  # Added dynamically by scrum-master on sprint initialisation.
  # See pattern comment at top of file.
