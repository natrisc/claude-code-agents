# Gate progression rules:
# context_ready         <- product_owner sets context/project_context.md status: accepted
# planning_complete     <- requires context_ready; pm + scrum master artifacts accepted
# analysis_complete     <- requires planning_complete; all analysis/* artifacts accepted
# architecture_complete <- requires analysis_complete; all architecture/* artifacts accepted
# implementation_complete <- requires architecture_complete; delivery/* artifacts accepted
# qa_complete           <- requires implementation_complete; quality/test_report.md accepted
# security_complete     <- requires architecture_complete; quality/security_review.md accepted
# sprint_review_ready   <- requires implementation_complete + qa_complete + security_complete
# po_decision_made      <- requires sprint_review_ready; reviews/po_decision.md completed
