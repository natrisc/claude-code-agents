project:
  name: ""
  active_context_version: "0.1"
  current_sprint: ""   # e.g. sprint-01 — set when scrum-master initialises a sprint
  status: draft

roles:
  product_owner: pending
  product_manager: pending
  scrum_master: pending
  business_analyst: pending
  system_architect: pending
  frontend_developer: pending
  backend_developer: pending
  devops_engineer: pending
  qa_tester: pending
  security_officer: pending

gates:
  context_ready: false
  planning_complete: false
  analysis_complete: false
  architecture_complete: false
  implementation_complete: false
  qa_complete: false
  security_complete: false
  sprint_review_ready: false
  po_decision_made: false

blockers: []

tasks: []
# Format:
# - id: TASK-001
#   title: Define uplink payload validation
#   owner: backend_developer
#   status: pending | in_progress | done | blocked

# Gate progression rules:
# context_ready           <- product_owner sets context/project_context.md status: accepted
# planning_complete       <- requires context_ready; planning/* and sprints/{sprint}/intent.md accepted
# analysis_complete       <- requires planning_complete; all analysis/* artifacts accepted
# architecture_complete   <- requires analysis_complete; all architecture/* artifacts accepted
# implementation_complete <- requires architecture_complete; sprints/{sprint}/delivery/* accepted
# qa_complete             <- requires implementation_complete; sprints/{sprint}/quality/test_report.md accepted
# security_complete       <- requires architecture_complete; sprints/{sprint}/quality/security_review.md accepted
# sprint_review_ready     <- requires implementation_complete + qa_complete + security_complete
# po_decision_made        <- requires sprint_review_ready; sprints/{sprint}/po_decision.md completed
#
# Sprint-scoped artifact paths use: sprints/{current_sprint}/...
# See state/product_progress.yaml for epic progress and sprint history.
